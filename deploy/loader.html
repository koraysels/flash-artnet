<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash kiosk</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    /* De feed vult het scherm; standaard verborgen tot we weten dat-ie up is. */
    #feed {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: 0; background: #000;
    }
    .hidden { display: none; }
    /* "Down"-toestand = puur zwart. Geen tekst/logo = minst amateuristisch. */
    #black { position: fixed; inset: 0; background: #000; }
  </style>
</head>
<body>
  <!-- Zwart scherm ligt eronder; de iframe komt eroverheen zodra de feed up is. -->
  <div id="black"></div>
  <iframe id="feed" class="hidden" referrerpolicy="no-referrer"></iframe>

  <script>
    // Feed-URL komt via ?url=... mee (kiosk.sh zet die erin).
    const url = new URLSearchParams(location.search).get('url');
    const feed = document.getElementById('feed');
    const POLL_MS = 3000;       // hoe vaak bereikbaarheid checken
    const TIMEOUT_MS = 4000;    // health-check timeout
    let up = false;

    async function reachable() {
      // no-cors: we lezen de response niet, we willen enkel weten of de
      // verbinding lukt. Server/tunnel volledig down -> fetch rej/throwt.
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: ctrl.signal });
        return true;
      } catch (e) {
        return false;
      } finally {
        clearTimeout(t);
      }
    }

    async function tick() {
      const ok = await reachable();
      if (ok && !up) {                 // kwam net online -> feed tonen
        up = true;
        feed.src = url;
        feed.classList.remove('hidden');
      } else if (!ok && up) {          // viel weg -> terug zwart
        up = false;
        feed.classList.add('hidden');
        feed.removeAttribute('src');
      }
    }

    if (!url) {
      document.title = 'Flash kiosk (geen url)';
    } else {
      tick();
      setInterval(tick, POLL_MS);
    }
  </script>
</body>
</html>
